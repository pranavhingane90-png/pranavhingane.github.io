# Modern Theme Upgrade for Pranav Project Hub

Replace your current `<style>` section with this complete upgraded styling.

```css
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#090979,#020024,#000000);
background-size:400% 400%;
animation:bgAnimation 12s ease infinite;
color:white;
overflow-x:hidden;
}

/* ANIMATED BACKGROUND */

@keyframes bgAnimation{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

/* LOGIN PAGE */

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#000428,#004e92);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(10px);
}

.login-box{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:25px;
backdrop-filter:blur(18px);
text-align:center;
width:320px;
box-shadow:0 0 30px rgba(0,255,255,0.3);
animation:fadeIn 1s ease;
}

.login-box h2{
font-size:28px;
margin-bottom:20px;
}

.login-box input{
width:90%;
padding:14px;
margin:12px 0;
border:none;
border-radius:12px;
outline:none;
font-size:15px;
background:rgba(255,255,255,0.15);
color:white;
}

.login-box input::placeholder{
color:#ddd;
}

.login-btn{
background:linear-gradient(45deg,#00e676,#00c853);
color:black;
padding:12px 25px;
font-weight:bold;
font-size:16px;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.08);
}

/* HEADER */

header{
text-align:center;
padding:70px 20px;
animation:fadeIn 1.5s ease;
}

header h1{
font-size:55px;
margin-bottom:10px;
background:linear-gradient(to right,#00e5ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.highlight{
color:#00ffae;
font-weight:bold;
}

header p{
font-size:18px;
opacity:0.9;
}

/* SEARCH BAR */

.search-box{
text-align:center;
margin:30px;
}

.search-box input{
padding:15px;
width:340px;
border-radius:40px;
border:none;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
color:white;
box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.search-box input::placeholder{
color:#ddd;
}

/* BUTTONS */

button{
padding:10px 15px;
border:none;
border-radius:10px;
margin:5px 3px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
font-size:14px;
}

button:hover{
transform:scale(1.07);
}

.detailsBtn{
background:linear-gradient(45deg,#00bcd4,#2196f3);
color:white;
}

.buyBtn{
background:linear-gradient(45deg,#25D366,#128C7E);
color:white;
}

.locationBtn{
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
}

/* PROJECT SECTION */

.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:25px;
}

.card{
width:280px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:20px;
padding:18px;
transition:0.4s;
box-shadow:0 0 25px rgba(0,0,0,0.4);
animation:slideUp 0.8s ease;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(45deg,transparent,rgba(255,255,255,0.08),transparent);
transform:rotate(25deg);
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

.card:hover{
transform:translateY(-10px) scale(1.05);
background:rgba(255,255,255,0.14);
box-shadow:0 0 35px rgba(0,255,255,0.4);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.card h3{
font-size:20px;
margin-bottom:8px;
}

.card p{
font-size:14px;
line-height:1.5;
}

.price{
color:#00ff95;
font-weight:bold;
font-size:20px;
margin-top:10px;
}

/* ADMIN PANEL */

.admin-panel{
background:rgba(255,255,255,0.08);
padding:25px;
text-align:center;
display:none;
margin:20px auto;
width:80%;
border-radius:20px;
backdrop-filter:blur(15px);
}

.admin-panel input{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
width:250px;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.8);
margin-top:50px;
font-size:14px;
letter-spacing:1px;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

@keyframes slideUp{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}
```

Also add this line inside `<head>` ABOVE your style tag:

```html
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
```
