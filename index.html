<!DOCTYPE html>
<html>

<head>
<title>Pranav Project Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* LOGIN PAGE */

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#000428,#004e92);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
width:300px;
animation:fadeIn 1s ease;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

.login-btn{
background:#00e676;
color:black;
padding:10px 20px;
font-weight:bold;
}

/* MAIN WEBSITE */

header{
text-align:center;
padding:60px 20px;
animation:fadeIn 1.5s ease;
}

header h1{
font-size:42px;
}

.highlight{
color:#00e676;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
padding:12px;
width:300px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
}

.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:260px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
transition:0.4s;
animation:slideUp 0.8s ease;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
background:rgba(255,255,255,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00e676;
font-weight:bold;
font-size:18px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
margin:5px 3px;
cursor:pointer;
font-weight:bold;
}

.detailsBtn{
background:#00bcd4;
color:white;
}

.buyBtn{
background:#25D366;
color:white;
}

.locationBtn{
background:#ff9800;
color:white;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}

.admin-panel{
background:rgba(0,0,0,0.7);
padding:20px;
text-align:center;
display:none;
}

.admin-panel input{
padding:8px;
margin:5px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideUp{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h2>🔐 Login</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button class="login-btn" onclick="login()">Login</button>

<p id="loginMessage"></p>

</div>

</div>

<!-- LOCATION -->

<div style="text-align:center;margin-top:20px;">

<button class="locationBtn" onclick="getLocation()">
📍 Allow Location
</button>

<p id="locationStatus"></p>

</div>

<!-- HEADER -->

<header>

<h1>
<i class="fa-solid fa-microchip"></i>
Real Project Hub
</h1>

<h3>
Created by
<span class="highlight">Pranav Hingane</span>
</h3>

<p>
Electronics Engineer | IoT Innovator | Smart Systems Developer
</p>

</header>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="🔍 Search Project..."
onkeyup="filterProjects()"
>

</div>

<!-- ADMIN BUTTON -->

<div style="text-align:center;">

<button onclick="toggleAdmin()">
<i class="fa-solid fa-user-gear"></i>
Admin Dashboard
</button>

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel" id="adminPanel">

<h3>Admin Panel</h3>

<input
type="text"
id="newProject"
placeholder="New Project Name"
>

<button onclick="addProject()">
Add Project
</button>

</div>

<!-- PROJECTS -->

<section class="projects" id="projectContainer"></section>

<!-- FOOTER -->

<footer>

© 2026 Pranav Hingane | All Rights Reserved

</footer>

<script>

/* LOGIN SYSTEM */

function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(username==="pranav" && password==="1234"){

document.getElementById("loginPage").style.display="none";

localStorage.setItem("loggedIn","true");

}
else{

document.getElementById("loginMessage").innerHTML =
"❌ Wrong Username or Password";

}

}

/* AUTO LOGIN */

if(localStorage.getItem("loggedIn")==="true"){

window.onload=function(){

document.getElementById("loginPage").style.display="none";

};

}

/* LOCATION */

let userLocation="";

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(showPosition,showError);

}else{

document.getElementById("locationStatus").innerHTML=
"Location not supported";

}

}

function showPosition(position){

const lat=position.coords.latitude;
const lon=position.coords.longitude;

userLocation=
"https://maps.google.com/?q="+lat+","+lon;

document.getElementById("locationStatus").innerHTML=
"Location captured ✔";

}

function showError(){

document.getElementById("locationStatus").innerHTML=
"Location permission denied";

}

/* PROJECTS */

let projects=[

"Smart Energy Meter using IoT",
"Autonomous Delivery Drone",
"AI Based Face Recognition System",
"Solar Powered Water Pump",
"Wireless Health Monitoring System",
"Electric Vehicle Battery Management",
"Smart Traffic Congestion Analyzer",
"Bluetooth Controlled Robotic Arm",
"Voice Controlled Home Automation",
"Smart Street Lighting System",
"Smart Helmet Accident Alert",
"Wireless ECG Monitoring",
"AI Traffic Prediction Model",
"Solar Powered EV Charger",
"Smart Fire Monitoring System"

];

const container=
document.getElementById("projectContainer");

/* DISPLAY PROJECTS */

function displayProjects(list){

container.innerHTML="";

list.forEach(project=>{

let price="₹1999";

if(project.includes("AI")) price="₹4999";
if(project.includes("Drone")) price="₹3999";
if(project.includes("IoT")) price="₹2999";

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="https://via.placeholder.com/300x150">

<h3>${project}</h3>

<p>
Complete engineering project with
documentation, source code,
circuit diagram & explanation.
</p>

<p class="price">${price}</p>

<button class="detailsBtn">
<i class="fa-solid fa-circle-info"></i>
Details
</button>

<button class="buyBtn">
<i class="fa-brands fa-whatsapp"></i>
Buy
</button>

`;

/* DETAILS */

card.querySelector(".detailsBtn").onclick=function(){

window.location.href=
"project.html?title="+encodeURIComponent(project);

};

/* BUY */

card.querySelector(".buyBtn").onclick=function(){

buyProject(project,price);

};

container.appendChild(card);

});

}

/* WHATSAPP */

function buyProject(projectName,price){

let message=

"Hello Pranav,%0A%0A"+
"I am interested in: "+projectName+
"%0A"+
"Price: "+price+
"%0A"+
"My Location: "+userLocation+
"%0A%0A"+
"Please share project details.";

let url=
"https://wa.me/919322018190?text="+message;

window.open(url,"_blank");

}

/* SEARCH */

function filterProjects(){

const input=
document.getElementById("searchInput")
.value.toLowerCase();

const filtered=
projects.filter(p=>

p.toLowerCase().includes(input)

);

displayProjects(filtered);

}

/* ADMIN PANEL */

function toggleAdmin(){

const panel=
document.getElementById("adminPanel");

panel.style.display=
panel.style.display==="none"
?
"block"
:
"none";

}

/* ADD PROJECT */

function addProject(){

const newProject=
document.getElementById("newProject").value;

if(newProject.trim()!==""){

projects.push(newProject);

displayProjects(projects);

document.getElementById("newProject").value="";

alert("Project Added!");

}

}

/* INITIAL LOAD */

displayProjects(projects);

</script>

</body>
</html>
